name: Deploy JSDoc to GitHub Pages

on:
  push:
    branches: ["main"] # The action runs whenever you push to your main branch

# These permissions allow the Action to actually create the website
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # STEP 1: Build the HTML files from your Javascript
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JSDoc
        run: npm install jsdoc

      - name: Generate HTML Documentation
        # This looks for your jsdoc.json file for instructions
        run: npx jsdoc -c jsdoc.json

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # This folder name must match the "destination" in your jsdoc.json
          path: './docs'

  # STEP 2: Take those HTML files and put them on the web
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
